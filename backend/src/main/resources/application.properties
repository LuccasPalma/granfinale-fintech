spring.application.name=Via-Cartao

server.port=8080

# Banco local para desenvolvimento com o frontend.
# Para usar Oracle, execute com variaveis DB_URL, DB_USERNAME, DB_PASSWORD e DB_DRIVER.
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/via-cartao;MODE=Oracle;DATABASE_TO_UPPER=false}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
